name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Notify DecisionOps — run started
        if: always()
        run: |
          curl -s -X POST "${{ secrets.DECISIONOPS_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "action": "in_progress",
              "workflow_run": {
                "id": ${{ github.run_id }},
                "head_branch": "${{ github.ref_name }}",
                "head_sha": "${{ github.sha }}"
              },
              "repository": {
                "full_name": "${{ github.repository }}",
                "clone_url": "https://github.com/${{ github.repository }}.git"
              },
              "sender": { "login": "${{ github.actor }}" }
            }' || true

      - name: Run tests
        id: run_tests
        run: |
          set -o pipefail
          pytest test_app.py -v --tb=short 2>&1 | tee test_output.txt
        continue-on-error: true

      - name: Notify DecisionOps — run completed
        if: always()
        run: |
          if [ "${{ steps.run_tests.outcome }}" == "success" ]; then
            CONCLUSION="success"
            FAILED_TESTS=""
            ERROR_OUTPUT=""
          else
            CONCLUSION="failure"
            FAILED_TESTS=$(grep "FAILED" test_output.txt | sed 's/FAILED //' | sed 's/ -.*//' | head -5 | tr '\n' ',' || echo "")
            ERROR_OUTPUT=$(grep -A3 "ERROR\|SyntaxError\|FAILED\|assert" test_output.txt | head -20 | tr '\n' ' ' | tr '"' "'" || echo "test failed")
          fi

          curl -s -X POST "${{ secrets.DECISIONOPS_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"action\": \"completed\",
              \"workflow_run\": {
                \"id\": ${{ github.run_id }},
                \"conclusion\": \"${CONCLUSION}\",
                \"head_branch\": \"${{ github.ref_name }}\",
                \"head_sha\": \"${{ github.sha }}\",
                \"failed_tests\": \"${FAILED_TESTS}\",
                \"error_output\": \"${ERROR_OUTPUT}\"
              },
              \"repository\": {
                \"full_name\": \"${{ github.repository }}\",
                \"clone_url\": \"https://github.com/${{ github.repository }}.git\"
              },
              \"sender\": { \"login\": \"${{ github.actor }}\" }
            }" || true
