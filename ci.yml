name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Notify DecisionOps — run started
        if: always()
        run: |
          curl -s -X POST "${{ secrets.DECISIONOPS_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=placeholder" \
            -d '{
              "action": "in_progress",
              "workflow_run": {
                "id": ${{ github.run_id }},
                "name": "CI Pipeline",
                "status": "in_progress",
                "conclusion": null,
                "head_branch": "${{ github.ref_name }}",
                "head_sha": "${{ github.sha }}",
                "html_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                "run_attempt": ${{ github.run_attempt }}
              },
              "repository": {
                "full_name": "${{ github.repository }}",
                "clone_url": "https://github.com/${{ github.repository }}.git",
                "default_branch": "main"
              },
              "sender": {
                "login": "${{ github.actor }}"
              }
            }' || echo "DecisionOps notification failed (non-blocking)"

      - name: Run tests
        id: run_tests
        run: |
          set -o pipefail
          pytest test_app.py -v --tb=short 2>&1 | tee test_output.txt

      - name: Notify DecisionOps — run completed
        if: always()
        run: |
          # Determine conclusion
          if [ "${{ steps.run_tests.outcome }}" == "success" ]; then
            CONCLUSION="success"
          else
            CONCLUSION="failure"
          fi

          # Get failed test names from output
          FAILED_TESTS=$(grep "FAILED" test_output.txt | head -5 | tr '\n' ',' || echo "")

          curl -s -X POST "${{ secrets.DECISIONOPS_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=placeholder" \
            -d "{
              \"action\": \"completed\",
              \"workflow_run\": {
                \"id\": ${{ github.run_id }},
                \"name\": \"CI Pipeline\",
                \"status\": \"completed\",
                \"conclusion\": \"${CONCLUSION}\",
                \"head_branch\": \"${{ github.ref_name }}\",
                \"head_sha\": \"${{ github.sha }}\",
                \"html_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
                \"run_attempt\": ${{ github.run_attempt }},
                \"failed_tests\": \"${FAILED_TESTS}\"
              },
              \"repository\": {
                \"full_name\": \"${{ github.repository }}\",
                \"clone_url\": \"https://github.com/${{ github.repository }}.git\",
                \"default_branch\": \"main\"
              },
              \"sender\": {
                \"login\": \"${{ github.actor }}\"
              }
            }" || echo "DecisionOps notification failed (non-blocking)"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: test_output.txt
